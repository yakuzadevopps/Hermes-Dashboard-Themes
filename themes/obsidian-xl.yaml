name: obsidian-xl
label: Obsidian XL
description: "Large obsidian command layout: easier reading, bigger targets, still dark and clean."
palette:
  background: { hex: "#050507", alpha: 1 }
  midground: { hex: "#ffffff", alpha: 1 }
  foreground: { hex: "#ffffff", alpha: 0 }
  warmGlow: "rgba(47, 109, 246, 0.06)"
  noiseOpacity: 0
typography:
  fontSans: '"Atkinson Hyperlegible", system-ui, -apple-system, "Segoe UI", sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, "SF Mono", monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
  baseSize: "17.5px"
  lineHeight: "1.75"
  letterSpacing: "0"
layout:
  radius: ".65rem"
  density: spacious
layoutVariant: cockpit
colorOverrides:
  card: "#121217"
  cardForeground: "#ffffff"
  popover: "#121217"
  popoverForeground: "#ffffff"
  primary: "#6ea8ff"
  primaryForeground: "#ffffff"
  secondary: "#24242b"
  secondaryForeground: "#ffffff"
  muted: "#1c1c22"
  mutedForeground: "#d4d4da"
  accent: "#10254d"
  accentForeground: "#ffffff"
  destructive: "#ff4d4d"
  destructiveForeground: "#ffffff"
  success: "#22c55e"
  warning: "#f59e0b"
  border: "#666675"
  input: "#666675"
  ring: "#6ea8ff"
customCSS: |
      :root { color-scheme: dark; }
      * { text-shadow: none !important; }
      [class*="noise"], [class*="glow"], [class*="aurora"] { opacity: 0 !important; }
      main { padding: 1.4rem !important; }
      button, input, select { min-height: 42px !important; }
      p, li { line-height: 1.78 !important; }
      :focus-visible { outline: 3px solid var(--ring) !important; outline-offset: 3px !important; }
