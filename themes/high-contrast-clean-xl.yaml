name: high-contrast-clean-xl
label: High Contrast Clean XL
description: "Same accessibility-first contrast, but larger type, larger hit targets, and more breathing room."
palette:
  background: { hex: "#050505", alpha: 1 }
  midground: { hex: "#ffffff", alpha: 1 }
  foreground: { hex: "#ffffff", alpha: 0 }
  warmGlow: "rgba(47, 109, 246, 0.08)"
  noiseOpacity: 0
typography:
  fontSans: '"Atkinson Hyperlegible", system-ui, -apple-system, "Segoe UI", sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, "SF Mono", monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
  baseSize: "17px"
  lineHeight: "1.72"
  letterSpacing: "0"
layout:
  radius: "0.55rem"
  density: spacious
layoutVariant: standard
colorOverrides:
  card: "#111111"
  cardForeground: "#ffffff"
  popover: "#111111"
  popoverForeground: "#ffffff"
  primary: "#2f6df6"
  primaryForeground: "#ffffff"
  secondary: "#242424"
  secondaryForeground: "#ffffff"
  muted: "#1e1e1e"
  mutedForeground: "#d0d0d0"
  accent: "#102a5c"
  accentForeground: "#ffffff"
  destructive: "#ff4d4d"
  destructiveForeground: "#ffffff"
  success: "#22c55e"
  warning: "#f59e0b"
  border: "#777777"
  input: "#999999"
  ring: "#2f6df6"
customCSS: |
  :root { color-scheme: dark; }
  * { text-shadow: none !important; }
  [class*="noise"], [class*="glow"], [class*="aurora"] { opacity: 0 !important; }
  body { font-size: 17px !important; }
  nav a, button { min-height: 38px; }
  main { padding: 1.25rem !important; }
  [class*="card"], section { border-width: 1.5px !important; }
  :focus-visible { outline: 3px solid var(--ring) !important; outline-offset: 3px !important; }
  a:hover, button:hover { filter: brightness(1.12); }

